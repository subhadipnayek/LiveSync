services:
  # 1. Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4000:80"
    depends_on:
      - api-loadbalancer

  # 2. .NET Web API
  livesync-api:
    build:
      context: ./backend/LiveSync.Api
      dockerfile: Dockerfile
    deploy:
      replicas: 2
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=host.docker.internal;Port=5432;Database=livesync;Username=devuser;Password=devpassword
      - Redis__ConnectionString=host.docker.internal:6379,password=LocalDevPassword123!,abortConnect=false
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 3. .NET SignalR Hub
  livesync-signalr:
    build:
      context: ./backend/LiveSync.SignalR
      dockerfile: Dockerfile
    deploy:
      replicas: 2
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Redis__ConnectionString=host.docker.internal:6379,password=LocalDevPassword123!,abortConnect=false
      - Services__ApiBaseUrl=http://api-loadbalancer:80/
      - Jwt__Secret=LiveSync-Development-Only-Secret-Change-Me!
      - Jwt__Issuer=LiveSyncAuthAPI
      - Jwt__Audience=LiveSyncClient
      - Cors__AllowedOrigins__0=http://localhost:4200
      - Cors__AllowedOrigins__1=http://localhost:4000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # REMOVED: depends_on api-loadbalancer (breaks circular loop)

  # 4. Nginx Load Balancer
  api-loadbalancer:
    image: nginx:alpine
    ports:
      - "5038:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - livesync-api
      - livesync-signalr