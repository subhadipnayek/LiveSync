events { worker_connections 1024; }

http {
    # 1. Upstream for .NET Web API (Round-Robin)
    upstream backend_api {
        server livesync-api:8080;
    }
	
	upstream backend_sandbox {
    server livesync-sandbox:8080;
	}

    # 2. Upstream for .NET SignalR Hubs (Sticky Sessions via ip_hash)
    upstream backend_signalr {
        ip_hash;
        server livesync-signalr:8080;
    }

    server {
        listen 80;

        # Standard REST API endpoints -> livesync-api
        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SignalR WebSocket connections -> livesync-signalr
        location /hubs/ {
            proxy_pass http://backend_signalr;

            # Required headers for SignalR WebSocket upgrade handshake
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Prevent Nginx from closing long-lived SignalR connections prematurely
            proxy_read_timeout 100s;
            proxy_send_timeout 100s;
        }

        # Catch-all fallback for REST requests if /api/ prefix isn't strictly used
        location / {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
		
		location /sandbox/ {
			proxy_pass http://backend_sandbox;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}
    }
}